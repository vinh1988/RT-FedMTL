# Federated Learning Configuration for STL (STS-B)
# Using BERT-base as teacher and BERT-tiny + LoRA as student

# Model configuration
model:
  server_model: "bert-base-uncased"  # Teacher model (BERT-base)
  client_model: "prajjwal1/bert-tiny"  # Student model (Tiny-BERT)
  freeze_client_model: true  # Freeze the base client model
  apply_lora_to_teacher: true  # Apply LoRA to teacher model
  apply_lora_to_student: true  # Apply LoRA to student model

# PEFT LoRA configuration
peft_lora:
  # LoRA specific parameters
  lora_rank: 16  # Rank of the update matrices
  lora_alpha: 64.0  # Alpha parameter for scaling
  lora_dropout: 0.1  # Dropout probability for LoRA layers
  lora_bias: "none"  # Bias type: 'none', 'all', or 'lora_only'
  
  # Target modules for LoRA
  lora_target_modules: ["query", "value"]  # Apply LoRA to query and value matrices
  
  # Modules to keep trainable (unfrozen)
  lora_modules_to_save: ["classifier"]  # Keep classifier trainable
  
  # Unfreeze top N layers of the model (0 = only classifier, -1 = all layers)
  unfreeze_layers: 0

knowledge_distillation:
  use_kd: true
  kd_start_round: 1
  temperature: 3.0
  alpha: 0.5  # Weight for KD loss (1.0 means full KD, 0.0 means no KD)
  beta: 0.5   # Weight for reverse KD (teacher learning from student)
  bidirectional: true
  use_attention_transfer: true  # Enable attention transfer
  use_hidden_states: true       # Use hidden states for KD
  use_logits: true              # Use logits for KD

synchronization:
  enabled: true
  frequency: "per_round"
  global_model_sharing: true

training:
  num_rounds: 10
  min_clients: 1
  max_clients: 1
  expected_clients: 1
  local_epochs: 1
  batch_size: 8
  learning_rate: 0.0002

task_configs:
  stsb:  # STS-B semantic similarity
    train_samples: 4249
    val_samples: 1500
    test_samples: 1379
    random_seed: 42
    metric: ["pearson", "spearman"]
    metric_for_best_model: "pearson"
    greater_is_better: true

# Logging configuration
logging:
  level: "INFO"
  file: "federated_stsb_client.log"
  server_log: "federated_server.log"

# Output directory for saving models and results
results_dir: "./results"

# Early stopping configuration
early_stopping:
  patience: 5
  min_delta: 0.001
  metric: "pearson"
  mode: "max"
