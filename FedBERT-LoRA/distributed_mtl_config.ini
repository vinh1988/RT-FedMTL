# Distributed MTL System Configuration
# No federated learning, each client trains on specific dataset with MTL

[DISTRIBUTED_MTL_SETTINGS]
# Server configuration
server_model = bert-base-uncased
port = 8771

# Training settings
num_rounds = 5
local_epochs = 2
batch_size = 16
learning_rate = 2e-5
weight_decay = 0.01

# Multi-task learning settings
distillation_temperature = 3.0
distillation_alpha = 0.5

# Data settings
samples_per_client = 800
data_distribution = iid

# System settings
timeout = 300
log_level = INFO
