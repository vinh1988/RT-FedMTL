# FedAvg federated learning configuration
_target_: aggregation.fedavg.AggregationConfig

# Client participation
num_clients: 10
clients_per_round: 5
min_available_clients: 5

# Communication rounds
num_rounds: 50

# Aggregation strategy
weighting_strategy: "data_size"  # uniform, data_size, loss_based
momentum: 0.0
clip_norm: null  # Gradient clipping norm, null to disable

# Client selection
client_sampling: "random"  # random, importance_based
replacement: false
