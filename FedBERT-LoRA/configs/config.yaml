# Main configuration for FedBERT-LoRA
defaults:
  - model: bert_tiny_fed
  - training: default
  - federated: fedavg
  - _self_

# Experiment settings
experiment:
  name: "fedbert_lora_experiment"
  seed: 42
  device: "cuda"  # cuda, cpu, auto
  log_level: "INFO"

# Data settings
data:
  dataset_name: "glue"
  task_name: "sst2"  # sst2, cola, mrpc, etc.
  max_length: 128
  train_batch_size: 16
  eval_batch_size: 32
  num_workers: 4

# Federated Learning settings
federated:
  num_clients: 10
  clients_per_round: 5
  num_rounds: 50
  local_epochs: 3

# Model architecture
server_model:
  name: "bert-base-uncased"
  hidden_size: 768
  num_attention_heads: 12
  num_hidden_layers: 12

client_model:
  name: "huawei-noah/TinyBERT_General_4L_312D"
  hidden_size: 312
  num_attention_heads: 12
  num_hidden_layers: 4

# LoRA settings
lora:
  r: 16
  alpha: 32
  dropout: 0.1
  target_modules: ["query", "value", "key", "dense"]

# Knowledge transfer
knowledge_transfer:
  projection_hidden_size: 512
  progressive_transfer:
    enabled: true
    warmup_rounds: 5
    transfer_weight: 0.5
  dynamic_alignment:
    enabled: true
    logits_weight: 0.7
    hidden_weight: 0.3
    temperature: 4.0

# Logging
logging:
  use_wandb: false
  use_tensorboard: true
  log_dir: "./logs"
  save_model_every: 10
