# Default training configuration
local_epochs: 3
learning_rate: 2e-5
weight_decay: 0.01
warmup_steps: 100
gradient_clipping: 1.0

# Optimizer settings
optimizer: "adamw"
scheduler: "linear"
adam_epsilon: 1e-8
adam_beta1: 0.9
adam_beta2: 0.999

# Training settings
max_steps: -1  # -1 means use epochs
save_steps: 500
eval_steps: 100
logging_steps: 50
