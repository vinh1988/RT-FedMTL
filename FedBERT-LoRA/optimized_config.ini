# Optimized MTL Federated Learning Configuration
# Focus on improving STSB regression performance

[OPTIMIZED_MTL_SETTINGS]
# Optimized for better STSB regression performance

# Model settings - smaller models for faster training
server_model = prajjwal1/bert-tiny
client_model = prajjwal1/bert-tiny

# Training settings optimized for regression
num_rounds = 5
min_clients = 1
max_clients = 3
local_epochs = 3
batch_size = 8
learning_rate = 5e-5  # Lower LR for regression stability
weight_decay = 0.01

# Knowledge Distillation optimized for regression
distillation_temperature = 2.0  # Lower temperature for regression
distillation_alpha = 0.3  # Less emphasis on KD for regression

# Data settings optimized for STSB regression
samples_per_client = 400  # More data for regression task
max_samples_per_client = 400
data_distribution = non_iid
non_iid_alpha = 0.3  # Lower alpha for better regression distribution

# Regression-specific optimizations
balance_classes = true
oversample_minority = false  # Not needed for regression
normalize_weights = true

# Communication settings
port = 8771
timeout = 90  # Longer timeout for regression training
websocket_timeout = 45
retry_attempts = 5

# Enhanced regression settings
regression_bins = 8  # Optimal number of bins for STSB
regression_loss_weight = 1.0  # Equal weight for regression loss
classification_loss_weight = 1.0  # Equal weight for classification loss

# Early stopping for regression improvement
early_stopping_patience = 3
early_stopping_min_delta = 0.001

# Learning rate scheduling for regression
lr_scheduler_warmup_steps = 100
lr_scheduler_type = linear

# Gradient clipping for regression stability
max_grad_norm = 1.0

# Logging and monitoring
log_level = INFO
save_checkpoints = false  # Disable for faster training
detailed_metrics = true
